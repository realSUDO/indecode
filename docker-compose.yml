services:
  postgresdb:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    container_name: indecode-postgres-dev

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: indecode

    ports:
      - "5432:5432"

    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
