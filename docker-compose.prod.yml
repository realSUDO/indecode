version: '3.8'
services:
  marketing:
    image: ghcr.io/realsudo/indecode-marketing:latest
    container_name: marketing
    restart: always
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=${DATABASE_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    expose:
      - "3000"
    networks:
      - default
      - global_proxy_net

  payment:
    image: ghcr.io/realsudo/indecode-payment:latest
    container_name: payment
    restart: always
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - NEXT_PUBLIC_RAZORPAY_KEY_ID=${NEXT_PUBLIC_RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_ID=${NEXT_PUBLIC_RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    expose:
      - "3000"
    networks:
      - default
      - global_proxy_net
    depends_on:
      init-db:
        condition: service_completed_successfully

  web:
    image: ghcr.io/realsudo/indecode-web:latest
    container_name: web
    restart: always
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_PRIVATE_KEY=${GITHUB_PRIVATE_KEY}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - GITHUB_APP_NAME=${GITHUB_APP_NAME}
      - INNGEST_EVENT_KEY=${INNGEST_EVENT_KEY}
      - INNGEST_SIGNING_KEY=${INNGEST_SIGNING_KEY}
      - INNGEST_BASE_URL=http://inngest:8288
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - VALKEY_URL=redis://:${VALKEY_PASSWORD}@valkey:6379
      - API_BASE_URL=http://api:8080
    expose:
      - "3000"
    networks:
      - default
      - global_proxy_net
    depends_on:
      init-db:
        condition: service_completed_successfully
      db:
        condition: service_healthy

  auth:
    image: ghcr.io/realsudo/indecode-auth:latest
    container_name: auth
    restart: always
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_APP_NAME=${GITHUB_APP_NAME}
      - NEXT_PUBLIC_APP_DOMAIN=${NEXT_PUBLIC_APP_DOMAIN}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    expose:
      - "3000"
    networks:
      - default
      - global_proxy_net
    depends_on:
      init-db:
        condition: service_completed_successfully

  api:
    image: ghcr.io/realsudo/indecode-api:latest
    container_name: api
    restart: always
    environment:
      - PORT=8080
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - GITHUB_APP_NAME=${GITHUB_APP_NAME}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_PRIVATE_KEY=${GITHUB_PRIVATE_KEY}
      - INNGEST_EVENT_KEY=${INNGEST_EVENT_KEY}
      - INNGEST_SIGNING_KEY=${INNGEST_SIGNING_KEY}
      - INNGEST_BASE_URL=http://inngest:8288
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - NEXT_PUBLIC_APP_DOMAIN=${NEXT_PUBLIC_APP_DOMAIN}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - RAZORPAY_KEY_ID=${NEXT_PUBLIC_RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET}
      - VALKEY_URL=redis://:${VALKEY_PASSWORD}@valkey:6379
    expose:
      - "8080"
    networks:
      - default
      - global_proxy_net
    depends_on:
      init-db:
        condition: service_completed_successfully

  admin:
    image: ghcr.io/realsudo/indecode-admin:latest
    container_name: admin
    restart: always
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - NEXT_PUBLIC_BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - NEXT_PUBLIC_AUTH_URL=${BETTER_AUTH_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - VALKEY_URL=redis://:${VALKEY_PASSWORD}@valkey:6379
    expose:
      - "3000"
    networks:
      - default
      - global_proxy_net
    depends_on:
      init-db:
        condition: service_completed_successfully

  init-db:
    image: ghcr.io/realsudo/indecode-migrator:latest
    container_name: init-db
    restart: "no"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - default
      - global_proxy_net
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: indecode
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d indecode"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"

  valkey:
    image: valkey/valkey:latest
    container_name: valkey
    restart: always
    command: valkey-server --requirepass ${VALKEY_PASSWORD}
    volumes:
      - valkey_data:/data
    networks:
      - default

  inngest:
    image: inngest/inngest:latest
    container_name: inngest
    restart: always
    command: inngest start --host 0.0.0.0 --port 8288
    environment:
      - INNGEST_EVENT_KEY=${INNGEST_EVENT_KEY}
      - INNGEST_SIGNING_KEY=${INNGEST_SIGNING_KEY}
      - INNGEST_REDIS_URI=redis://:${VALKEY_PASSWORD}@valkey:6379
      - INNGEST_POSTGRES_URI=${DATABASE_URL}
      - INNGEST_DEV=0
    networks:
      - default
      - global_proxy_net
    depends_on:
      - valkey
      - db
    volumes:
      - inngest_data:/home/inngest/.inngest

volumes:
  pgdata:
  valkey_data:
  inngest_data:

networks:
  default:
  global_proxy_net:
    external: true
